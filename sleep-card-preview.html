<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sleep Card Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#050505;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;gap:40px;flex-wrap:wrap;padding:40px;}

.label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.25);text-align:center;margin-bottom:12px;}

/* Exact card styles from index.html */
.pod-card2{
  border-radius:16px;padding:22px 20px 24px;
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;
  cursor:pointer;min-height:170px;
  border:1px solid transparent;
  width:220px;
}
.pod2-badge{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:0.14em;text-transform:uppercase;background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.8);padding:4px 10px;border-radius:999px;display:inline-block;margin-bottom:14px;align-self:flex-start;position:relative;z-index:2;}
.pod2-name{font-size:20px;font-weight:700;color:#fff;letter-spacing:-0.02em;margin-bottom:6px;position:relative;z-index:2;}
.pod2-sub{font-size:13px;font-weight:400;line-height:1.4;flex:1;padding-bottom:18px;color:#7dd4a6;position:relative;z-index:2;max-width:52%;}
.pod2-cta{display:inline-flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:0.10em;text-transform:uppercase;color:rgba(255,255,255,0.5);position:relative;z-index:2;white-space:nowrap;}
.pod2-cta-arrow{width:22px;height:22px;border-radius:50%;border:1px solid rgba(255,255,255,0.2);display:inline-flex;align-items:center;justify-content:center;font-size:11px;color:rgba(255,255,255,0.6);flex-shrink:0;}

/* The bottle — bottom-right anchored, partially cropped */
.pod-bottle{
  position:absolute;
  bottom:-10px;
  right:-14px;
  width:105px;
  height:auto;
  object-fit:contain;
  opacity:0.38;
  z-index:1;
  pointer-events:none;
  -webkit-mask-image:linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.4) 22%, black 55%);
  mask-image:linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.4) 22%, black 55%);
}
</style>
</head>
<body>

<!-- BEFORE -->
<div>
  <div class="label">Before</div>
  <div class="pod-card2" style="background:linear-gradient(145deg,#162d22 0%,#1f4432 55%,#172e24 100%);border-color:rgba(90,200,140,0.10);box-shadow:0 0 32px rgba(80,190,130,0.09),0 4px 20px rgba(0,0,0,0.55);">
    <span class="pod2-badge">Recovery</span>
    <div class="pod2-name">Sleep</div>
    <div class="pod2-sub">for deep, restorative sleep</div>
    <div class="pod2-cta">Learn more <span class="pod2-cta-arrow">→</span></div>
  </div>
</div>

<!-- AFTER -->
<div>
  <div class="label">After</div>
  <div class="pod-card2" style="background:linear-gradient(145deg,#162d22 0%,#1f4432 55%,#172e24 100%);border-color:rgba(90,200,140,0.10);box-shadow:0 0 32px rgba(80,190,130,0.09),0 4px 20px rgba(0,0,0,0.55);">
    <span class="pod2-badge">Recovery</span>
    <div class="pod2-name">Sleep</div>
    <div class="pod2-sub">for deep, restorative sleep</div>
    <div class="pod2-cta">Learn more <span class="pod2-cta-arrow">→</span></div>
    <img class="pod-bottle" src="Sleep bottle.png" alt=""/>
  </div>
</div>

</body>
</html>
