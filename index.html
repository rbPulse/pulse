<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sign in — CommandOS</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="tokens.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.47.0/dist/umd/supabase.js"></script>
<style>
/* ══════════════════════════════════════════════════════════════════
   Universal root router for CommandOS.

   Every authenticated user lands here if they hit '/'. The router:

     1. Checks for an active Supabase session.
     2. If authenticated: reads profile + memberships, dispatches to
        the correct destination:
           platform_role set      → /commandos/
           tenant_owner / admin   → /t/{slug}/admin/
           other staff role       → /t/{slug}/portal/
           patient enrollment     → /t/{slug}/portal/
        Slug resolved from the first tenant the user belongs to.
     3. If not authenticated: renders a minimal sign-in form. No
        tenant branding, no marketing — the root is tenant-agnostic.
        Pulse (and future tenants) have their own marketing at
        /t/{slug}/.
     4. Respects ?session_expired=1 and renders a banner when present.

   Deliberately minimal: one form, one dispatch function, ~150 lines.
   This file replaces the old 2,187-line Pulse marketing + auth page
   (R2d). Pulse marketing moved to /t/pulse/.
   ══════════════════════════════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;-webkit-font-smoothing:antialiased;}
.router-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:40px 36px;max-width:400px;width:100%;box-shadow:var(--shadow-lg);}
.router-brand{display:flex;align-items:center;gap:12px;margin-bottom:28px;}
.router-icon{width:36px;height:36px;border:2px solid var(--slate);border-radius:50%;display:flex;align-items:center;justify-content:center;}
.router-icon svg{width:18px;height:18px;stroke:var(--slate);fill:none;stroke-width:2;}
.router-wordmark{font-family:'Inter',sans-serif;font-size:16px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text);}
.router-title{font-family:'Inter',sans-serif;font-size:22px;font-weight:700;letter-spacing:-0.02em;color:var(--text);margin-bottom:6px;}
.router-sub{font-family:'Inter',sans-serif;font-size:13px;color:var(--text3);margin-bottom:22px;line-height:1.5;}
.router-banner{background:var(--amber-tint);border:1px solid var(--amber-border);color:var(--amber);padding:12px 14px;border-radius:var(--radius-sm);font-size:12px;margin-bottom:18px;display:none;line-height:1.5;}
.router-banner.show{display:block;}
.router-field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.router-field label{font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);}
.router-field input{background:rgba(0,0,0,0.03);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;font-size:14px;font-family:'Inter',sans-serif;color:var(--text);outline:none;transition:border-color .15s;}
.router-field input:focus{border-color:var(--slate);}
.router-submit{width:100%;background:var(--slate);color:#fff;border:none;padding:12px 20px;font-size:13px;font-weight:600;border-radius:var(--radius-pill);cursor:pointer;margin-top:6px;transition:opacity .15s;letter-spacing:0.04em;}
.router-submit:hover{opacity:0.88;}
.router-submit:disabled{opacity:0.4;cursor:not-allowed;}
.router-err{color:var(--red);font-size:12px;margin-top:10px;display:none;line-height:1.5;}
.router-err.show{display:block;}
.router-loading{text-align:center;color:var(--text3);font-size:13px;padding:40px 0;}
.router-footer{margin-top:22px;font-size:11px;color:var(--text4);text-align:center;line-height:1.5;}
.router-footer a{color:var(--text3);text-decoration:underline;}
</style>
</head>
<body>
<div class="router-card">
  <div class="router-brand">
    <div class="router-icon">
      <svg viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
    </div>
    <span class="router-wordmark">COMMANDOS</span>
  </div>

  <div id="routerLoading" class="router-loading">Checking session…</div>

  <div id="routerSignin" style="display:none;">
    <div class="router-title">Sign in</div>
    <div class="router-sub">Enter your email and password to continue.</div>
    <div id="routerBanner" class="router-banner"></div>
    <div class="router-field">
      <label for="rEmail">Email</label>
      <input id="rEmail" type="email" autocomplete="email"/>
    </div>
    <div class="router-field">
      <label for="rPass">Password</label>
      <input id="rPass" type="password" autocomplete="current-password"/>
    </div>
    <button class="router-submit" id="rSubmit" onclick="doSignIn()">Sign in</button>
    <div id="rErr" class="router-err"></div>
    <div class="router-footer">Problems signing in? Contact your tenant administrator.</div>
  </div>
</div>

<script>
var SB_URL = 'https://zvfqukbbglxongvuymzt.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp2ZnF1a2JiZ2x4b25ndnV5bXp0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NTQyOTMsImV4cCI6MjA5MDEzMDI5M30.UUfF8CjM0Y4WWFRcXs1hn4jDtRXyoMu2lMrda8YfRBw';
var db = supabase.createClient(SB_URL, SB_KEY);

// Handle ?session_expired=1 banner before anything else.
(function() {
  var q = new URLSearchParams(window.location.search);
  if (q.get('session_expired') === '1') {
    var b = document.getElementById('routerBanner');
    b.textContent = 'Your session expired. Sign in to continue.';
    b.classList.add('show');
  }
})();

// On load, check session and dispatch. If no session, show the form.
db.auth.getSession().then(function(r) {
  if (r.data && r.data.session) {
    dispatch(r.data.session.user);
  } else {
    showSignin();
  }
}).catch(function() {
  showSignin();
});

function showSignin() {
  document.getElementById('routerLoading').style.display = 'none';
  document.getElementById('routerSignin').style.display = 'block';
  document.getElementById('rEmail').focus();
}

function showErr(msg) {
  var el = document.getElementById('rErr');
  el.textContent = msg;
  el.classList.add('show');
}

function clearErr() {
  var el = document.getElementById('rErr');
  el.textContent = '';
  el.classList.remove('show');
}

function doSignIn() {
  var email = document.getElementById('rEmail').value.trim();
  var pass  = document.getElementById('rPass').value;
  clearErr();
  if (!email || !email.includes('@')) { showErr('Enter a valid email.'); return; }
  if (!pass) { showErr('Password required.'); return; }
  var btn = document.getElementById('rSubmit');
  btn.disabled = true;
  btn.textContent = 'Signing in…';
  db.auth.signInWithPassword({ email: email, password: pass })
    .then(function(r) {
      if (r.error) {
        btn.disabled = false;
        btn.textContent = 'Sign in';
        showErr(r.error.message || 'Sign-in failed.');
        return;
      }
      dispatch(r.data.user);
    })
    .catch(function(err) {
      btn.disabled = false;
      btn.textContent = 'Sign in';
      showErr((err && err.message) || 'Sign-in failed.');
    });
}

// Route the authenticated user to their destination portal.
// Dispatch priority:
//   1. platform_role set → /commandos/
//   2. tenant_memberships row → /t/{slug}/admin/ (for owner/admin)
//      or /t/{slug}/portal/ (everything else staff-side)
//   3. patient_enrollments row → /t/{slug}/portal/
//   4. Legacy profiles.role fallback (pre-multi-tenant accounts):
//      assume Pulse tenant. Future: surface a "no tenant assigned"
//      state with support-contact copy.
function dispatch(user) {
  db.from('profiles').select('role, platform_role').eq('user_id', user.id).limit(1)
    .then(function(pr) {
      var profile = (pr.data && pr.data[0]) || {};

      if (profile.platform_role) {
        window.location.replace('/commandos/');
        return;
      }

      return Promise.all([
        db.from('tenant_memberships').select('tenant_id, role, tenants(slug)').eq('user_id', user.id).limit(1),
        db.from('patient_enrollments').select('tenant_id, tenants(slug)').eq('user_id', user.id).eq('status', 'active').limit(1)
      ]).then(function(results) {
        var mem = results[0].data && results[0].data[0];
        var enr = results[1].data && results[1].data[0];
        var slug, dest;

        if (mem) {
          slug = (mem.tenants && mem.tenants.slug) || 'pulse';
          dest = (mem.role === 'tenant_owner' || mem.role === 'tenant_admin')
            ? '/t/' + slug + '/admin/'
            : '/t/' + slug + '/portal/';
        } else if (enr) {
          slug = (enr.tenants && enr.tenants.slug) || 'pulse';
          dest = '/t/' + slug + '/portal/';
        } else {
          // Legacy profiles.role fallback during the multi-tenant
          // migration. Every account is assumed to belong to Pulse
          // until tenant_memberships / patient_enrollments are
          // backfilled. Remove this branch once Phase 0's backfill
          // runs and every existing user has explicit rows.
          if (profile.role === 'super_admin' || profile.role === 'admin') {
            dest = '/t/pulse/admin/';
          } else {
            dest = '/t/pulse/portal/';
          }
        }
        window.location.replace(dest);
      });
    })
    .catch(function(err) {
      console.error('[router] dispatch failed', err);
      showErr('Could not determine your destination. Contact support.');
      // If dispatch errors out, show the sign-in form again so the
      // user isn't stuck on a loading screen.
      showSignin();
    });
}

// Enter key shortcuts.
document.getElementById('rEmail').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('rPass').focus();
});
document.getElementById('rPass').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doSignIn();
});
</script>
</body>
</html>
