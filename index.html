<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pulse — Peptide Delivery System</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Anybody:ital,wdth,wght@0,75..125,100..900;1,75..125,100..900&family=Inter:wght@300;400;500;600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<style>
:root {
  --bg: #050505;
  --surface: #0e0e0e;
  --card: #141414;
  --card2: #1a1a1a;
  --border: rgba(255,255,255,0.07);
  --green: #00ff6a;
  --green-dim: rgba(0,255,106,0.1);
  --green-glow: rgba(0,255,106,0.2);
  --white: #ffffff;
  --grey: rgba(255,255,255,0.65);
  --grey2: rgba(255,255,255,0.42);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--white);font-family:'Inter',sans-serif;font-weight:400;overflow-x:hidden;cursor:none;}
/* GRAIN */
#grain{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:9998;opacity:.032;}
/* CURSOR */
.cur{position:fixed;width:8px;height:8px;background:var(--green);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);box-shadow:0 0 12px var(--green);transition:width .25s,height .25s;}
.cur-ring{display:none;}
/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:20px 40px;background:linear-gradient(to bottom,rgba(5,5,5,0.95) 0%,transparent 100%);}
.nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none;}
.nav-icon{width:32px;height:32px;border:2px solid var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;}
.nav-icon svg{width:16px;height:16px;stroke:var(--green);fill:none;stroke-width:2;}
.nav-name{font-family:'DM Mono',monospace;font-size:16px;font-weight:500;color:var(--white);letter-spacing:0.05em;}
.nav-links{display:flex;gap:36px;list-style:none;}
.nav-links a{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--grey);text-decoration:none;transition:color .25s;}
.nav-links a:hover{color:var(--green);}
.nav-cta{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.15em;text-transform:uppercase;background:var(--green);color:#000;border:none;padding:10px 24px;border-radius:999px;cursor:none;font-weight:500;transition:all .25s;text-decoration:none;box-shadow:0 0 20px var(--green-glow);}
.nav-cta:hover{background:#fff;box-shadow:0 0 28px rgba(255,255,255,0.2);}
/* HERO */
#hero{position:relative;height:100vh;min-height:700px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;overflow:hidden;padding-bottom:80px;}
.hero-bg{position:absolute;inset:0;}
.hero-bg img{width:100%;height:100%;object-fit:cover;object-position:center 15%;display:block;}
.hero-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(5,5,5,0.82) 0%,rgba(5,5,5,0.2) 35%,rgba(5,5,5,0.15) 60%,rgba(5,5,5,0.85) 85%,rgba(5,5,5,0.98) 100%);}
.hero-content{position:relative;z-index:2;text-align:center;padding:0 24px;}
.hero-badge{display:inline-flex;align-items:center;gap:8px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.35em;text-transform:uppercase;color:var(--green);margin-bottom:24px;opacity:0;animation:fadeUp .7s ease .1s forwards;}
.hero-badge-dot{width:6px;height:6px;background:var(--green);border-radius:50%;box-shadow:0 0 8px var(--green);animation:blink 2s ease infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
.hero-logo{font-family:'Anybody',sans-serif;font-size:clamp(80px,15vw,200px);font-variation-settings:'wght' 200,'wdth' 100;letter-spacing:0.12em;line-height:1;color:#fff;margin-bottom:4px;opacity:0;animation:fadeUp .8s ease .25s forwards;text-shadow:0 0 60px rgba(5,5,5,0.6);}
.hero-tagline{font-size:clamp(20px,2.8vw,32px);font-weight:300;color:rgba(255,255,255,0.9);letter-spacing:0.01em;line-height:1.35;margin-bottom:40px;opacity:0;animation:fadeUp .7s ease .45s forwards;}
.hero-tagline strong{color:var(--green);font-weight:400;}
.hero-actions{display:flex;gap:14px;justify-content:center;align-items:center;opacity:0;animation:fadeUp .7s ease .6s forwards;}
.btn-green{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;background:var(--green);color:#000;border:none;padding:14px 32px;border-radius:999px;cursor:none;font-weight:500;transition:all .25s;text-decoration:none;display:inline-block;box-shadow:0 0 24px var(--green-glow);}
.btn-green:hover{background:#fff;box-shadow:0 0 32px rgba(255,255,255,0.25);}
.btn-outline{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;background:transparent;color:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.2);padding:14px 32px;border-radius:999px;cursor:none;transition:all .25s;text-decoration:none;display:inline-block;}
.btn-outline:hover{border-color:rgba(255,255,255,0.4);color:#fff;}
.hero-scroll{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);z-index:2;display:flex;flex-direction:column;align-items:center;gap:6px;opacity:0;animation:fadeIn .8s ease 1.1s forwards;}
.hero-scroll span{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:0.3em;color:rgba(255,255,255,0.25);text-transform:uppercase;}
.scroll-line{width:1px;height:28px;background:linear-gradient(to bottom,var(--green),transparent);animation:scrollpulse 2s ease infinite;}
@keyframes scrollpulse{0%,100%{opacity:.4;}50%{opacity:1;}}
/* STATS */
.stats-bar{background:var(--surface);border-top:1px solid var(--border);border-bottom:1px solid var(--border);display:flex;justify-content:center;}
.stat-item{flex:1;max-width:260px;padding:28px 40px;text-align:center;border-right:1px solid var(--border);}
.stat-item:last-child{border-right:none;}

.stat-num{font-family:'DM Mono',monospace;font-size:36px;font-weight:400;color:var(--green);line-height:1;margin-bottom:6px;}
.stat-label{font-size:11px;letter-spacing:0.1em;color:var(--grey);text-transform:uppercase;}
/* SHARED SECTION STYLES */
section{position:relative;padding:100px 40px;}
.eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.4em;text-transform:uppercase;color:var(--green);margin-bottom:16px;}
.section-h{font-size:clamp(32px,4vw,56px);font-weight:600;line-height:1.1;letter-spacing:-0.02em;margin-bottom:16px;}
.section-sub{font-size:15px;font-weight:300;color:var(--grey);line-height:1.75;}
/* PROBLEM SECTION */
#problem{background:var(--bg);padding:0;overflow:hidden;}
.problem-grid{display:grid;grid-template-columns:1fr 1fr;min-height:80vh;}
.problem-img{position:relative;overflow:hidden;}
.problem-img img{width:100%;height:100%;object-fit:cover;object-position:center;display:block;}
.problem-img::after{content:'';position:absolute;inset:0;background:linear-gradient(to right,transparent 55%,var(--bg) 100%);}
.problem-text{padding:80px 60px;display:flex;flex-direction:column;justify-content:center;background:var(--bg);}
.friction-list{margin-top:36px;display:flex;flex-direction:column;gap:2px;}
.friction-item{background:var(--card);padding:22px 24px;border-left:3px solid transparent;transition:all .3s;}
.friction-item:hover{border-left-color:var(--green);background:var(--card2);}
.friction-code{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.25em;color:var(--green);margin-bottom:6px;}
.friction-title{font-size:14px;font-weight:500;color:#fff;margin-bottom:4px;}
.friction-body{font-size:12px;font-weight:300;color:var(--grey);line-height:1.65;}
/* PEPTIDE EDUCATION SECTION */
#peptides{background:var(--surface);}
.peptides-inner{max-width:1100px;margin:0 auto;}
.peptides-header{text-align:center;margin-bottom:72px;}
.peptide-explainer{display:grid;grid-template-columns:1fr 1fr;gap:2px;align-items:stretch;}
.peptide-chain{margin-top:28px;display:flex;flex-direction:column;gap:2px;flex:1;}
.chain-item{padding:18px 22px;background:rgba(255,255,255,0.03);border-left:2px solid transparent;transition:border-color .3s;}
.chain-item:hover{border-left-color:var(--green);}
.chain-label{font-size:13px;font-weight:500;margin-bottom:4px;}
.chain-body{font-size:12px;font-weight:300;color:var(--grey);line-height:1.65;}
.pep-molecule{background:var(--card);padding:36px 32px;border:1px solid rgba(255,255,255,0.06);}
.pep-molecule-header{margin-bottom:28px;}
.pep-pathway{display:flex;flex-direction:column;}
.pep-step{display:flex;align-items:flex-start;gap:16px;}
.pep-step-dot{width:10px;height:10px;border-radius:50%;background:var(--grey2);flex-shrink:0;margin-top:3px;}
.pep-dot-green{background:var(--green);box-shadow:0 0 8px var(--green-glow);}
.pep-step-label{font-size:13px;font-weight:500;margin-bottom:2px;}
.pep-step-sub{font-size:11px;font-weight:300;color:var(--grey);}
.pep-connector{width:1px;height:28px;background:rgba(255,255,255,0.08);margin-left:4px;}
.pep-molecule-note{margin-top:28px;padding-top:20px;border-top:1px solid rgba(255,255,255,0.06);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.1em;color:var(--grey2);}
.benefit-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;margin-bottom:2px;}
.benefit-card{background:var(--card);padding:36px 30px;position:relative;overflow:hidden;transition:transform .3s;}
.benefit-card:hover{transform:translateY(-2px);}
.benefit-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--green),transparent);opacity:0;transition:opacity .3s;}
.benefit-card:hover::before{opacity:1;}
.benefit-icon{font-family:'DM Mono',monospace;font-size:28px;color:rgba(0,255,106,0.3);line-height:1;margin-bottom:20px;}
.benefit-title{font-size:17px;font-weight:600;margin-bottom:10px;}
.benefit-body{font-size:13px;font-weight:300;color:var(--grey);line-height:1.7;}
.benefit-compounds{margin-top:16px;display:flex;flex-wrap:wrap;gap:4px;}
.benefit-compound{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.12em;color:var(--green);background:var(--green-dim);border:1px solid rgba(0,255,106,0.2);padding:3px 10px;border-radius:999px;}
.audience-split{display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-top:2px;}
.audience-card{background:var(--card2);padding:32px 32px;}
.audience-tag{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.3em;text-transform:uppercase;color:rgba(255,255,255,0.55);margin-bottom:20px;}
.audience-h{font-size:20px;font-weight:700;color:var(--white);margin-bottom:12px;line-height:1.3;}
.audience-body{font-size:13px;font-weight:300;color:var(--grey);line-height:1.75;margin-bottom:24px;}
.audience-qs{display:flex;flex-direction:column;gap:10px;}
.audience-q{font-size:12px;font-weight:400;color:var(--grey);line-height:1.6;padding-left:16px;border-left:2px solid rgba(0,255,106,0.3);}
/* WHY PULSE COMPARISON */
#problem{background:var(--bg);padding:100px 40px;}
.compare-inner{max-width:1100px;margin:0 auto;}
.compare-header{max-width:700px;margin:0 auto 64px;text-align:center;}
.analogy-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;margin-bottom:56px;}
.analogy-card{background:var(--card);padding:32px 28px;}
.analogy-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.3em;text-transform:uppercase;color:var(--grey2);margin-bottom:14px;}
.analogy-text{font-size:15px;font-weight:400;line-height:1.55;color:rgba(255,255,255,0.85);}
.analogy-text em{color:var(--green);font-style:normal;font-weight:500;}
.experience-split{display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-bottom:56px;align-items:stretch;}
.exp-col-label{padding:0 0 20px 0;}
.pain-row{display:flex;flex-direction:column;gap:2px;}
.pain-item{display:flex;align-items:flex-start;gap:24px;padding:22px 26px;background:var(--card);border-left:3px solid rgba(255,80,80,0.3);transition:border-color .3s;}
.pain-item:hover{border-left-color:rgba(255,80,80,0.7);}
.pulse-item{border-left-color:rgba(0,255,106,0.3);}
.pulse-item:hover{border-left-color:var(--green);}
.pain-icon{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.25em;color:rgba(255,100,100,0.5);flex-shrink:0;padding-top:3px;}
.pain-title{font-size:14px;font-weight:500;color:#fff;margin-bottom:4px;}
.pain-body{font-size:12px;font-weight:300;color:var(--grey);line-height:1.65;}
.cmp-table{width:100%;border-collapse:collapse;}
.cmp-table thead th{padding:20px 24px;text-align:left;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.18em;text-transform:uppercase;background:var(--card);border-bottom:1px solid var(--border);vertical-align:bottom;}
.cmp-table thead th.col-diy,.cmp-table thead th.col-spa{color:var(--grey);}
.cmp-table thead th.col-label{color:var(--grey2);width:160px;}
.cmp-table thead th.col-pulse{color:var(--green);background:rgba(0,255,106,0.04);border-bottom:2px solid var(--green);}
.cmp-table tbody td{padding:18px 24px;font-size:13px;font-weight:300;border-bottom:1px solid rgba(255,255,255,0.04);vertical-align:top;line-height:1.5;}
.cmp-table tbody td.col-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--grey2);white-space:nowrap;font-weight:400;}
.cmp-table tbody td.col-diy,.cmp-table tbody td.col-spa{color:var(--grey);}
.cmp-table tbody td.col-pulse{background:rgba(0,255,106,0.03);border-bottom-color:rgba(0,255,106,0.06);}
.cmp-table tbody tr:hover td{background:var(--card);}
.cmp-table tbody tr:hover td.col-pulse{background:rgba(0,255,106,0.06);}
.cmp-yes{color:var(--green);font-weight:400;}
.cmp-no{color:rgba(255,90,90,0.8);}
.cmp-mid{color:rgba(255,200,60,0.85);}
/* HOW IT WORKS */
#how{background:var(--surface);}
.how-inner{max-width:1100px;margin:0 auto;}
.how-header{text-align:center;margin-bottom:64px;}
.steps-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;}
.step-card{background:var(--card);padding:44px 36px;position:relative;overflow:hidden;transition:transform .35s;}
.step-card:hover{transform:translateY(-3px);}
.step-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--green),transparent);opacity:0;transition:opacity .35s;}
.step-card:hover::after{opacity:1;}
.step-num{font-family:'DM Mono',monospace;font-size:64px;font-weight:400;color:var(--green);opacity:0.7;line-height:1;margin-bottom:16px;}
.step-title{font-size:22px;font-weight:600;margin-bottom:12px;}
.step-body{font-size:13px;font-weight:300;color:var(--grey);line-height:1.75;}
/* Load. Press. Done mini flow */
.lpd-flow{display:flex;align-items:center;gap:8px;margin-top:16px;}
.lpd-step{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.1em;color:var(--grey2);}
.lpd-step.active{color:var(--green);}
.lpd-arrow{color:var(--grey2);font-size:10px;}
/* PODS SECTION */
#pods{background:var(--bg);}
.pods-inner{max-width:1100px;margin:0 auto;}
.pods-header{text-align:center;margin-bottom:48px;}
.filter-tabs{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:48px;}
.filter-tab{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.15em;text-transform:uppercase;padding:9px 20px;border-radius:999px;border:1px solid rgba(255,255,255,0.15);background:transparent;color:var(--grey);cursor:none;transition:all .25s;}
.filter-tab.active{background:var(--green);color:#000;border-color:var(--green);box-shadow:0 0 16px var(--green-glow);}
.filter-tab:hover:not(.active){border-color:rgba(255,255,255,0.3);color:#fff;}
.pods-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
.pod-card{background:var(--card);border-radius:20px;padding:28px;position:relative;overflow:hidden;border:1px solid rgba(255,255,255,0.05);transition:border-color .3s;display:flex;flex-direction:column;}
.pod-card:hover{border-color:rgba(0,255,106,0.2);transform:translateY(-2px);}
.pod-card.hidden{display:none;}
.pod-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;}
.pod-card:nth-child(3) .pod-card-top,.pod-card:nth-child(4) .pod-card-top{margin-top:24px;}
.pod-icon{width:48px;height:48px;border-radius:12px;background:var(--card2);display:flex;align-items:center;justify-content:center;}
.pod-icon svg{width:22px;height:22px;}
.pod-category-badge{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;padding:5px 12px;border-radius:999px;border:1px solid;}
.badge-recovery{color:#00ff6a;border-color:rgba(0,255,106,0.4);}
.badge-performance{color:#00c8ff;border-color:rgba(0,200,255,0.4);}
.badge-bodycomp{color:#ff8c00;border-color:rgba(255,140,0,0.4);}
.badge-longevity{color:#c084fc;border-color:rgba(192,132,252,0.4);}
.pod-name{font-size:20px;font-weight:600;margin-bottom:4px;}
.pod-compounds{font-family:'DM Mono',monospace;font-size:11px;color:var(--green);margin-bottom:12px;letter-spacing:0.05em;}
.pod-desc{font-size:13px;font-weight:300;color:var(--grey);line-height:1.65;margin-bottom:20px;}
.pod-specs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px;}
.pod-spec{background:var(--card2);border-radius:10px;padding:12px;text-align:center;}
.pod-spec-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:0.2em;text-transform:uppercase;color:var(--grey2);margin-bottom:4px;}
.pod-spec-value{font-size:13px;font-weight:500;}
.pod-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;}
.pod-tag{font-size:11px;font-weight:400;color:var(--grey);background:var(--card2);border-radius:999px;padding:4px 12px;border:1px solid rgba(255,255,255,0.06);}
.pod-footer{display:flex;align-items:center;justify-content:space-between;padding-top:16px;border-top:1px solid rgba(255,255,255,0.07);margin-top:auto;}
.pod-price{font-size:28px;font-weight:600;}.pod-price span{font-size:14px;font-weight:300;color:var(--grey);}
.pod-btn{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.15em;text-transform:uppercase;background:var(--green);color:#000;border:none;padding:12px 24px;border-radius:999px;cursor:none;font-weight:500;transition:all .25s;}
.pod-btn:hover{background:#fff;}
.popular-badge{position:absolute;top:16px;left:50%;transform:translateX(-50%);font-family:'DM Mono',monospace;font-size:8px;letter-spacing:0.2em;text-transform:uppercase;background:var(--green);color:#000;padding:4px 14px;border-radius:999px;font-weight:500;white-space:nowrap;}
/* STACKS */
#stacks{background:var(--surface);}
.stacks-inner{max-width:1100px;margin:0 auto;}
.stacks-header{text-align:center;margin-bottom:56px;}
.stacks-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
.stack-card{background:var(--card);border-radius:20px;padding:28px;border:1px solid rgba(255,255,255,0.05);transition:border-color .3s;display:flex;flex-direction:column;}
.stack-card:hover{border-color:rgba(0,255,106,0.2);}
.stack-badge{display:inline-block;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;padding:5px 14px;border-radius:999px;background:var(--green-dim);color:var(--green);border:1px solid rgba(0,255,106,0.25);margin-bottom:20px;}
.stack-pods{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;}
.stack-pod-row{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:500;}
.stack-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dot-blue{background:#00c8ff;box-shadow:0 0 8px rgba(0,200,255,0.5);}
.dot-green{background:#00ff6a;box-shadow:0 0 8px rgba(0,255,106,0.5);}
.dot-orange{background:#ff8c00;box-shadow:0 0 8px rgba(255,140,0,0.5);}
.dot-purple{background:#c084fc;box-shadow:0 0 8px rgba(192,132,252,0.5);}
.stack-desc{font-size:13px;font-weight:300;color:var(--grey);line-height:1.65;margin-bottom:20px;}
.stack-footer{display:flex;align-items:center;justify-content:space-between;padding-top:16px;border-top:1px solid rgba(255,255,255,0.07);margin-top:auto;}
.stack-price-old{font-size:13px;color:var(--grey2);text-decoration:line-through;margin-right:10px;}
.stack-price{font-size:26px;font-weight:600;color:var(--green);}
.stack-price span{font-size:14px;font-weight:300;color:var(--grey);}
.stack-btn{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.15em;text-transform:uppercase;background:transparent;color:var(--green);border:1px solid rgba(0,255,106,0.4);padding:11px 22px;border-radius:999px;cursor:none;font-weight:500;transition:all .25s;}
.stack-btn:hover{background:var(--green);color:#000;}
/* KIT SECTION */
#kit{background:var(--bg);padding:0;overflow:hidden;}
.kit-grid{display:grid;grid-template-columns:1fr 1fr;min-height:75vh;}
.kit-content{padding:80px 60px;display:flex;flex-direction:column;justify-content:center;}
.kit-tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:32px;}
.kit-tag{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--green);border:1px solid rgba(0,255,106,0.25);padding:6px 14px;border-radius:999px;background:var(--green-dim);}
.kit-img{position:relative;overflow:hidden;}
.kit-img img{width:100%;height:100%;object-fit:cover;display:block;}
.kit-img::after{content:'';position:absolute;inset:0;background:linear-gradient(to left,transparent 60%,var(--bg) 100%);}
/* WAITLIST */
#waitlist{background:#020804;text-align:center;position:relative;overflow:hidden;}
#waitlist::after{content:'';position:absolute;left:0;right:0;top:0;height:1px;background:linear-gradient(90deg,transparent,var(--green),transparent);opacity:0.5;z-index:3;}
#wl-canvas{position:absolute;inset:0;width:100%;height:100%;z-index:1;display:block;}
.waitlist-inner{position:relative;z-index:2;max-width:560px;margin:0 auto;}
.waitlist-title{font-size:clamp(40px,5.5vw,72px);font-weight:600;line-height:1;margin-bottom:16px;letter-spacing:-0.02em;}
.waitlist-title em{font-style:italic;color:var(--green);font-weight:400;}
.waitlist-sub{font-size:15px;font-weight:300;color:var(--grey);line-height:1.75;margin-bottom:44px;}
.waitlist-form{display:flex;max-width:440px;margin:0 auto 16px;}
.waitlist-input{flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-right:none;color:#fff;font-family:'Inter',sans-serif;font-size:14px;padding:14px 20px;outline:none;border-radius:999px 0 0 999px;transition:border-color .25s,background .25s;}
.waitlist-input::placeholder{color:rgba(255,255,255,0.2);}
.waitlist-input:focus{border-color:rgba(0,255,106,0.4);background:rgba(0,255,106,0.03);}
.waitlist-btn{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;background:var(--green);color:#000;border:none;padding:14px 26px;border-radius:0 999px 999px 0;cursor:none;font-weight:500;transition:all .25s;white-space:nowrap;box-shadow:0 0 20px var(--green-glow);}
.waitlist-btn:hover{background:#fff;}
.waitlist-note{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.15em;color:rgba(255,255,255,0.18);text-transform:uppercase;}
.success-msg{display:none;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--green);padding:16px;}
/* REVIEWS */
#reviews{background:var(--bg);}
.reviews-inner{max-width:1100px;margin:0 auto;}
.reviews-header{text-align:center;margin-bottom:56px;}
.reviews-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;}
.review-card{background:var(--card);padding:32px 28px;display:flex;flex-direction:column;border:1px solid rgba(255,255,255,0.04);}
.review-stars{display:flex;gap:4px;margin-bottom:16px;}
.review-star{color:var(--green);font-size:13px;}
.review-body{font-size:13px;font-weight:300;color:var(--grey);line-height:1.75;flex:1;margin-bottom:24px;}
.review-author{padding-top:16px;border-top:1px solid rgba(255,255,255,0.06);}
.review-name{font-size:13px;font-weight:500;margin-bottom:3px;}
.review-meta{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.15em;color:var(--green);text-transform:uppercase;}
/* TESTIMONIAL v2 */
#testimonial{background:var(--surface);}
.testimonial-inner{max-width:860px;margin:0 auto;text-align:center;}
.testimonial-mark{font-size:72px;line-height:0.6;color:var(--green);opacity:0.4;font-family:Georgia,serif;margin-bottom:32px;display:block;}
.testimonial-quote{font-size:clamp(17px,2vw,24px);font-weight:400;line-height:1.65;color:var(--white);font-style:italic;margin-bottom:40px;}
.testimonial-divider{width:48px;height:1px;background:var(--green);margin:0 auto 28px;opacity:0.5;}
.testimonial-name{font-size:15px;font-weight:600;margin-bottom:6px;}
.testimonial-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.2em;color:var(--grey);text-transform:uppercase;line-height:1.8;}

/* FAQ */
#faq{background:var(--bg);}
.faq-inner{max-width:760px;margin:0 auto;}
.faq-header{text-align:center;margin-bottom:56px;}
details.faq-item{background:var(--card);border-left:3px solid transparent;transition:border-color .25s;margin-bottom:2px;}
details.faq-item[open]{border-left-color:var(--green);}
summary.faq-q{padding:22px 26px;font-size:14px;font-weight:500;cursor:pointer;list-style:none;display:flex;justify-content:space-between;align-items:center;gap:16px;}
summary.faq-q::-webkit-details-marker{display:none;}
summary.faq-q::after{content:'+';font-family:'DM Mono',monospace;font-size:18px;color:var(--green);flex-shrink:0;transition:transform .2s;}
details[open] summary.faq-q::after{content:'−';}
.faq-a{padding:0 26px 22px;font-size:13px;font-weight:300;color:var(--grey);line-height:1.8;}

/* FOOTER */
footer{background:var(--bg);border-top:1px solid var(--border);padding:32px 40px;display:flex;align-items:center;justify-content:space-between;}
.footer-brand{font-family:'DM Mono',monospace;font-size:14px;letter-spacing:0.3em;color:rgba(255,255,255,0.3);}
.footer-brand span{color:var(--green);}
.footer-copy{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.15em;color:rgba(255,255,255,0.12);text-transform:uppercase;}
.footer-links{display:flex;gap:24px;}
.footer-links a{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,255,255,0.18);text-decoration:none;transition:color .25s;}
.footer-links a:hover{color:var(--green);}
/* ANIMATIONS */
/* .reveal handled by GSAP ScrollTrigger */
.d1{transition-delay:.1s;}.d2{transition-delay:.2s;}.d3{transition-delay:.3s;}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
/* DISCLAIMER */
.disclaimer{font-size:11px;color:rgba(255,255,255,0.15);text-align:center;margin-top:24px;font-style:italic;}
/* ===== MOBILE ===== */
@media(max-width:900px){
  nav{padding:16px 20px;}
  .nav-links{display:none;}
  .theme-switcher{display:none;}
  section{padding:64px 20px;}
  .hero-logo{letter-spacing:0.15em;}
  .hero-actions{flex-direction:column;gap:10px;align-items:stretch;padding:0 16px;}
  .stats-bar{flex-wrap:wrap;}
  .stat-item{min-width:50%;border-right:none;border-bottom:1px solid var(--border);}
  .peptide-explainer{grid-template-columns:1fr;}
  .benefit-grid{grid-template-columns:1fr;}
  .audience-split{grid-template-columns:1fr;}
  .audience-card{padding:28px 20px;}
  .problem-grid{grid-template-columns:1fr;}
  .problem-img{height:50vw;}
  .problem-text{padding:40px 24px;}
  .analogy-strip{grid-template-columns:1fr;}
  .experience-split{grid-template-columns:1fr;}
  .steps-grid{grid-template-columns:1fr;}
  .step-card{padding:32px 24px;}
  .pods-grid{grid-template-columns:1fr;}
  .pod-specs{grid-template-columns:1fr 1fr;}
  .pod-card{padding:24px 20px;}
  .pod-card:nth-child(3) .pod-card-top,.pod-card:nth-child(4) .pod-card-top{margin-top:0;}
  .stacks-grid{grid-template-columns:1fr;}
  .stack-card{padding:24px 20px;}
  .kit-grid{grid-template-columns:1fr;}
  .kit-img{height:50vw;}
  .kit-content{padding:40px 24px;}
  .reviews-grid{grid-template-columns:1fr;}
  .review-card{padding:24px 20px;}
  .testimonial-inner{padding:0 8px;}
  .faq-item{padding:18px 20px;}
  .faq-a{padding:0 20px 18px;}
  .faq-q{font-size:13px;}
  .waitlist-form{flex-direction:column;max-width:100%;}
  .waitlist-form input,.waitlist-form button{width:100%;}
  footer{flex-direction:column;gap:14px;text-align:center;}
  .footer-links{flex-wrap:wrap;justify-content:center;}
  .cmp-table thead th,.cmp-table tbody td{padding:14px 16px;font-size:11px;}
  .cmp-table thead th.col-label,.cmp-table tbody td.col-label{display:none;}
}
@media(max-width:480px){
  section{padding:52px 16px;}
  .stat-item{min-width:100%;text-align:center;}
  .pod-specs{grid-template-columns:1fr;}
  .chain-item{padding:14px 16px;}
  .step-card{padding:28px 20px;}
  .analogy-card{padding:20px;}
}

)();
</script>

(function(){
  const canvas = document.getElementById('grain');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const SIZE = 200;
  const offscreen = document.createElement('canvas');
  offscreen.width = offscreen.height = SIZE;
  const octx = offscreen.getContext('2d');
  let frame = 0, pattern;
  function makeGrain() {
    const img = octx.createImageData(SIZE, SIZE);
    const d = img.data;
    for (let i = 0; i < d.length; i += 4) {
      const v = (Math.random() * 255) | 0;
      d[i] = d[i+1] = d[i+2] = v;
      d[i+3] = 255;
    }
    octx.putImageData(img, 0, 0);
    pattern = ctx.createPattern(offscreen, 'repeat');
  }
  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();
  makeGrain();
  function tick() {
    requestAnimationFrame(tick);
    frame++;
    if (frame % 4 !== 0) return;
    makeGrain();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = pattern;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }
  tick();
})();

  buttons.forEach(btn => state.set(btn, { tx: 0, ty: 0, cx: 0, cy: 0 }));
  let mouseX = -9999, mouseY = -9999;
  window.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
  function loop() {
    requestAnimationFrame(loop);
    buttons.forEach(btn => {
      const s = state.get(btn);
      const rect = btn.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const dx = mouseX - cx;
      const dy = mouseY - cy;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < RANGE) {
        const pull = (1 - dist / RANGE);
        s.tx = dx * pull * STRENGTH;
        s.ty = dy * pull * STRENGTH;
      } else {
        s.tx = 0;
        s.ty = 0;
      }
      s.cx += (s.tx - s.cx) * LERP;
      s.cy += (s.ty - s.cy) * LERP;
      btn.style.transform = `translate(${s.cx.toFixed(2)}px, ${s.cy.toFixed(2)}px)`;
    });
  }
  loop();
})();

/* ===== THEME SWITCHER ===== */
(function() {
  var toggleBtn = document.getElementById('theme-toggle-btn');
  var dropdown  = document.getElementById('theme-dropdown');
  var options   = document.querySelectorAll('.theme-option');

  function applyTheme(theme) {
    if (theme === 'base') {
      document.documentElement.removeAttribute('data-theme');
    } else {
      document.documentElement.setAttribute('data-theme', theme);
    }
    localStorage.setItem('pulse-theme', theme);
    options.forEach(function(opt) {
      opt.classList.toggle('active', opt.getAttribute('data-theme') === theme);
    });
    window.dispatchEvent(new CustomEvent('themechange'));
  }

  /* Sync active state on load and fire themechange so bg.js picks up saved theme */
  var saved = localStorage.getItem('pulse-theme') || 'base';
  options.forEach(function(opt) {
    opt.classList.toggle('active', opt.getAttribute('data-theme') === saved);
  });
  window.dispatchEvent(new CustomEvent('themechange'));

  toggleBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    dropdown.classList.toggle('open');
  });

  options.forEach(function(opt) {
    opt.addEventListener('click', function() {
      applyTheme(this.getAttribute('data-theme'));
      dropdown.classList.remove('open');
    });
  });

  document.addEventListener('click', function() {
    dropdown.classList.remove('open');
  });
})();

</script>
