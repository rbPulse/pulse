<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta http-equiv="refresh" content="0; url=../unite/"/>
<title>Unite</title>
<!--
  /commandos/ → /unite/ redirect stub (rebrand grace period).

  CommandOS was renamed to Unite. This stub lives at /commandos/
  to catch operators with stale bookmarks, browser history entries,
  or deep-links shared before the rename. It performs an immediate
  redirect via:

    1. <meta http-equiv="refresh"> — zero-delay server-less redirect
       that works even if JS is disabled.
    2. window.location.replace() — overrides the history entry so
       users don't back-button back into this stub.

  Retirement plan: keep this file for ~30 days after the rename
  (or until access logs show no /commandos/ traffic), then delete.
  Before removing, verify no internal link still points here via
  a repo-wide grep for "/commandos/".
-->
<style>
  html,body{height:100%;margin:0;}
  body{display:flex;align-items:center;justify-content:center;font-family:'Inter',system-ui,sans-serif;background:#f5f3ef;color:#1a1a1a;padding:20px;text-align:center;line-height:1.6;}
  p{max-width:420px;font-size:14px;color:#555;}
  a{color:#3A4A5C;font-weight:500;}
</style>
</head>
<body>
<p>Unite has a new home. Redirecting to <a href="../unite/">/unite/</a>…</p>
<script>
  // Swap the URL so back-button doesn't drop the user back on this stub.
  window.location.replace('../unite/' + (window.location.hash || ''));
</script>
</body>
</html>
